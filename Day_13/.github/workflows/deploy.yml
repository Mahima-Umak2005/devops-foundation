name: One Click Infrastructure Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t meetmux-capstone .

      - name: Security Audit - Check Root User
        run: |
          USER_CHECK=$(docker inspect meetmux-capstone --format='{{.Config.User}}')

          if [ -z "$USER_CHECK" ] || [ "$USER_CHECK" = "0" ]; then
            echo "Root user detected! Build Failed."
            exit 1
          else
            echo "Non-root user verified."
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: cd terraform && terraform init

      - name: Terraform Apply
        run: cd terraform && terraform apply -auto-approve