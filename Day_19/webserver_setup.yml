---
- name: Configure MeetMux Web Servers
  hosts: localhost
  connection: local
  become: yes

  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Create index page
      copy:
        dest: /var/www/html/index.html
        content: |
          <h1>Welcome to MeetMux Production</h1>
          <p>Server Configured by Ansible</p>

    - name: Start Nginx
      service:
        name: nginx
        state: started
        enabled: yes